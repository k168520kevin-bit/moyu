<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Detail - Internal Use Only</title>
    <style>
        /* 直接复用首页的变量和基础样式 */
        :root {
            --bg-gray: #f8f9fa;
            --sidebar-gray: #ececec;
            --border-color: #d1d1d1;
            --text-main: #2c2c2c;
            --text-muted: #6c757d;
        }

        body {
            font-family: Georgia, serif;
            line-height: 1.8;
            margin: 0;
            display: flex; /* 保持 flex 布局以对齐侧边栏感 */
            background-color: #f4f4f4; /* 关键：外部背景色 */
            
            height: 100vh;      /* 强制 body 高度等于屏幕高度 */
            overflow: hidden;   /* 禁用 body 的全局滚动条 */
        }

        /* 侧边栏保持一致（虽然详情页可能不需要跳转，但保留它能维持视觉统一） */
        nav {
            width: 280px;
            background-color: var(--sidebar-gray);
            border-right: 1px solid var(--border-color);
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 14px;

            /* 关键修改：固定宽度，不参与 flex 缩放 */
            flex-shrink: 0; 
            height: 100vh;
            overflow-y: auto; /* 如果侧边栏菜单太长，允许它内部滚动 */
        }

        main {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
            position: relative;

            height: 100vh;      /* 高度也占满屏幕 */
            background-color: #f4f4f4; /* 确保滚动区域背景也是灰色 */
            scroll-behavior: smooth; /* 丝滑滚动 */
        }

        /* 复用首页的白色纸张样式 */
        .document-page {
            background: white;
            max-width: 850px;
            margin: 0 auto;
            padding: 60px 80px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
            min-height: 1100px;
        }

        /* 恢复水印：必须设为 fixed 或相对于 main 定位 */
        .watermark {
            position: fixed;
            top: 50%;
            left: 55%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 100px;
            color: rgba(0,0,0,0.03);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            z-index: 100;
        }

        .header-meta {
            font-size: 11px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
        }

        h1 { 
            font-size: 24px; 
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
        }

        /* 全文内容排版优化 */
        #full-content {
            color: var(--text-main);
            text-align: justify;
        }

        /* 返回按钮样式：不破坏行政感 */
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover { color: #000; }

        /* 骨架屏动画 */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-title { width: 40%; height: 24px; }
        .skeleton-text { width: 100%; height: 16px; }
        .skeleton-text-short { width: 80%; height: 16px; }

    </style>
</head>
<body>

    <nav>
        <div style="font-weight: bold; font-size: 16px; margin-bottom: 10px; border-bottom: 2px solid #333;">Audit Directories</div>
        <a href="moyu.html" class="back-link">⬅ Return to Trails</a>
    </nav>

    <main>
        <div class="watermark">CONFIDENTIAL</div>
        
        <div class="document-page">
            <a href="moyu.html" class="back-link"> [ BACK TO MASTER INDEX ] </a>
            
            <div class="header-meta">
                <span>DOC ID: <span id="doc-id">LOADING...</span></span>
                <span>STATUS: VERIFIED | VERSION: 2.1.4</span>
                <span>RETRIEVED: <span id="retrieved-date"></span></span>
            </div>

            <h1 id="article-title">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text-short"></div>
            </h1>
            
            <div id="full-content">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text-short"></div>
            </div>

            <div style="margin-top: 100px; border-top: 1px dashed #ccc; padding-top: 20px; font-size: 12px; color: #999;">
                <p>ACCESS LOG: <span id="access-url"></span></p>
                <p>FOOTPRINT ID: <span id="footprint"></span></p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const supabaseUrl = 'https://ymjhrcyyizbjrqmqveie.supabase.co';
        const supabaseKey = 'sb_publishable_e_-rzt-UNeVLBe2pJ7zS6w_dHWo02yZ';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        async function fetchDetail() {
            if (!articleId) return;

            const { data, error } = await client
                .from('articles')
                .select('*')
                .eq('id', articleId)
                .single();

            if (data) {
                // --- 核心修改：处理时间戳 ---
                // 方案 A：直接截取字符串（最快，不受时区干扰）
                console.log(data.created_at);
                const formattedDate = data.created_at.split('T')[0];
                document.getElementById('retrieved-date').innerText = formattedDate;

                document.getElementById('article-title').innerText = data.title;
                document.getElementById('full-content').innerHTML = data.content;
                document.getElementById('doc-id').innerText = data.id.toString().substring(0, 13).toUpperCase();
                document.getElementById('access-url').innerText = data.from_url;
                document.getElementById('footprint').innerText = btoa(data.id).substring(0, 16);
            }
        }

        fetchDetail();

        /* 老板键保持一致 */
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                window.location.href = "https://www.google.com/search?q=quarterly+economic+report";
            }
        });
    </script>
</body>
</html>
